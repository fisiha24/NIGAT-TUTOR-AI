<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Nigat AI Tutor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #ffffff;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            padding: 45px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 18px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .contact-item:last-child {
            border-bottom: none;
        }

        .contact-item .icon {
            font-size: 1.8rem;
            width: 50px;
            text-align: center;
        }

        .contact-item .info {
            flex: 1;
        }

        .contact-item .info strong {
            display: block;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-item .info span {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .btn {
            display: inline-block;
            padding: 12px 35px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #ffffff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            margin-top: 25px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 30px rgba(79, 172, 254, 0.3);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }

            .card {
                padding: 25px;
            }

            .contact-item {
                flex-direction: column;
                text-align: center;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📧 Contact Us</h1>

            <div class="contact-item">
                <div class="icon">📞</div>
                <div class="info">
                    <strong>Phone</strong>
                    <span>0919 704 062 / 0978 127 213</span>
                </div>
            </div>

            <div class="contact-item">
                <div class="icon">📍</div>
                <div class="info">
                    <strong>Location</strong>
                    <span>Jekros, Addis Ababa, Ethiopia</span>
                </div>
            </div>

            <div class="contact-item">
                <div class="icon">👨‍🏫</div>
                <div class="info">
                    <strong>Creator</strong>
                    <span>Teacher Fisaha Melke</span>
                </div>
            </div>

            <div class="contact-item">
                <div class="icon">📧</div>
                <div class="info">
                    <strong>Email</strong>
                    <span>support@nigat.com</span>
                </div>
            </div>

            <a href="/" class="btn">🏠 Back to Home</a>
        </div>
    </div>
</body>
</html>
