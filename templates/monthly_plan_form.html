<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Monthly Plan - Nigat Tutor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('about') }}">About Us</a>
        <a href="{{ url_for('contact') }}">Contact</a>
        <a href="{{ url_for('register') }}">Register</a>
        <a href="{{ url_for('upload_file') }}">Upload</a>
        <a href="{{ url_for('lesson_home') }}" style="color: #ffcc00; font-weight: bold;">Lesson Plan</a>
        <a href="https://sites.google.com/view/your-site-link" target="_blank" style="color: #ffcc00; font-weight: bold;">Google Site</a>
    </nav>

    <section class="content-box" style="max-width: 700px;">
        <h1>📆 Monthly Lesson Plan</h1>
        <p>For: <strong>{{ annual.subject }}</strong> - Grade {{ annual.grade }}</p>
        <form method="POST" class="reg-form">
            <input type="text" name="month" placeholder="Month / ወር (e.g., September)" required>
            <textarea name="week_topics" placeholder="Week-by-week topics / በሳምንት የሚማሩ ርዕሶች" rows="5"></textarea>
            <button type="submit">Create Monthly Plan</button>
        </form>
    </section>
</body>
</html>
